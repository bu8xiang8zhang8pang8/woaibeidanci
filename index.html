<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>英语考100</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #f0f4fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px 16px 40px;
            display: flex;
            justify-content: center;
        }
        .app {
            max-width: 920px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            padding: 28px 24px 36px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 6px;
        }
        .header-left {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-width: 200px;
        }
        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        h1 { font-size: 1.8rem; font-weight: 600; color: #1a2a4a; display: flex; align-items: center; gap: 10px; }
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .upload-btn-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .btn-upload {
            background: #4a7cf7;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-upload:hover { background: #3a6ae0; }
        .btn-secondary { background: #eef2f9; color: #1f2f4a; border: none; padding: 8px 18px; border-radius: 30px; font-weight: 500; cursor: pointer; font-size: 0.8rem; }
        .btn-secondary:hover { background: #dce6f5; }
        .btn-danger-sm { background: #ffebee; color: #c62828; border: none; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; }
        .btn-danger-sm:hover { background: #ffcdd2; }
        .btn-sm { padding: 4px 14px; font-size: 0.75rem; border-radius: 30px; border: none; cursor: pointer; background: #eef2f9; }
        .btn-sm:hover { background: #dce6f5; }
        .btn-mic { background: #4a7cf7; color: white; border: none; padding: 10px 16px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .btn-mic:hover { background: #3a6ae0; }
        .btn-mic.listening { background: #e53935; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .subhead { color: #4a5f7a; font-size: 0.9rem; margin-bottom: 16px; padding-left: 12px; border-left: 4px solid #4a7cf7; }

        /* 词库列表 */
        .library-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
            padding: 10px 12px;
            background: #f7faff;
            border-radius: 20px;
            border: 1px solid #e6edf6;
            min-height: 44px;
            align-items: center;
        }
        .library-label { font-size: 0.75rem; color: #6a7f9f; font-weight: 500; margin-right: 4px; }
        .lib-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: white;
            padding: 4px 12px 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            border: 2px solid #dce6f5;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .lib-item:hover { border-color: #b0c8e8; }
        .lib-item.active { border-color: #4a7cf7; background: #e3edfe; font-weight: 500; }
        .lib-item .name { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .lib-item .count { color: #4a7cf7; font-weight: 600; font-size: 0.7rem; }
        .lib-item .del-btn { background: none; border: none; color: #b0b8c8; cursor: pointer; font-size: 0.8rem; padding: 0 2px; line-height: 1; }
        .lib-item .del-btn:hover { color: #c62828; }
        .lib-empty { color: #8a9fb0; font-size: 0.85rem; padding: 4px 0; }

        /* 统计行 */
        .stats-bar {
            display: flex; flex-wrap: wrap; gap: 8px 16px;
            background: #eef4fc; padding: 10px 18px; border-radius: 40px;
            margin-bottom: 12px; font-size: 0.9rem; color: #1f2f4a;
            align-items: center;
        }
        .stats-bar .badge { background: #d2def5; padding: 2px 16px; border-radius: 30px; font-weight: 500; }
        .stats-bar .wrong-badge { background: #ffebee; color: #b71c1c; padding: 2px 16px; border-radius: 30px; font-weight: 500; cursor: pointer; }

        /* 学习统计 */
        .stats-grid {
            display: flex; flex-wrap: wrap; gap: 12px 24px;
            background: #f8fbff; padding: 12px 18px; border-radius: 24px;
            margin-bottom: 12px; border: 1px solid #e6edf6;
            font-size: 0.85rem; color: #1f2f4a;
            align-items: center;
        }
        .stats-grid .item { display: flex; align-items: center; gap: 6px; }
        .stats-grid .num { font-weight: 700; color: #1a2a4a; font-size: 1.1rem; }

        /* 搜索 */
        .search-row {
            display: flex; gap: 8px; margin-bottom: 12px; align-items: center;
        }
        .search-input {
            flex: 1; padding: 8px 16px; border-radius: 30px; border: 2px solid #dce6f5;
            font-size: 0.9rem; outline: none; min-width: 120px;
        }
        .search-input:focus { border-color: #4a7cf7; }
        .search-result { margin-bottom: 12px; padding: 12px 16px; background: #e8f0fe; border-radius: 16px; display: none; font-size: 0.95rem; }
        .search-result .sr-en { font-weight: 600; font-size: 1.1rem; }
        .search-result .sr-ph { color: #4a6a8a; }
        .search-result .sr-zh { color: #1f2f4a; }

        .group-nav {
            display: flex; flex-wrap: wrap; gap: 8px;
            margin: 12px 0 16px;
        }
        .group-btn {
            background: #eef2f9; border: none; padding: 6px 16px; border-radius: 30px;
            font-size: 0.85rem; font-weight: 500; color: #1f2f4a; cursor: pointer;
            transition: 0.15s;
        }
        .group-btn.active { background: #1a2a4a; color: white; }
        .group-btn:hover { background: #d4def0; }
        .group-btn.active:hover { background: #2a3a5a; }
        .progress-wrap {
            display: flex; align-items: center; gap: 12px;
            margin: 6px 0 16px;
        }
        .progress-bar {
            flex: 1; height: 8px; background: #e0e8f2; border-radius: 20px; overflow: hidden;
        }
        .progress-fill { height: 100%; width: 0%; background: #4a7cf7; border-radius: 20px; transition: width 0.3s; }

        .word-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 12px;
            margin: 16px 0 20px;
        }
        .word-item {
            background: #f8fbff;
            border-radius: 16px;
            padding: 14px 16px;
            border: 1px solid #e6edf6;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: 0.15s;
        }
        .word-item .word-row { display: flex; justify-content: space-between; align-items: center; }
        .word-item .en { font-size: 1.15rem; font-weight: 600; color: #0a1a38; }
        .word-item .speak-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 4px 8px; border-radius: 30px; transition: 0.15s; opacity: 0.7; }
        .word-item .speak-btn:hover { background: #e6edf6; opacity: 1; }
        .word-item .phonetic { font-size: 0.85rem; color: #4a6a8a; margin-top: 2px; font-family: 'Times New Roman', 'IPA', serif; }
        .word-item .zh { font-size: 0.9rem; color: #1f2f4a; margin-top: 2px; }
        .word-item .status { font-size: 0.7rem; color: #2e7d32; margin-top: 6px; }
        .word-item.mastered { background: #e8f5e9; border-color: #a5d6a7; }
        .word-item .ai-example { font-size: 0.8rem; color: #4a6a8a; margin-top: 6px; background: #f0f4fa; padding: 6px 10px; border-radius: 12px; border-left: 3px solid #4a7cf7; }

        .quiz-area {
            background: #f8fbff;
            border-radius: 32px;
            padding: 24px 20px;
            margin: 12px 0 20px;
            text-align: center;
            border: 1px solid #e6edf6;
        }
        .quiz-prompt { font-size: 1.8rem; font-weight: 600; color: #0a1a38; margin-bottom: 4px; }
        .quiz-hint { font-size: 1rem; color: #4a6a8a; }
        .quiz-input {
            width: 70%; max-width: 280px; padding: 12px 20px; font-size: 1.2rem;
            border: 2px solid #d0dcee; border-radius: 60px; margin: 16px 0 12px;
            outline: none; text-align: center;
        }
        .quiz-input:focus { border-color: #4a7cf7; }
        .quiz-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; align-items: center; }
        .btn-primary { background: #1a2a4a; color: white; border: none; padding: 10px 32px; border-radius: 60px; font-weight: 600; cursor: pointer; font-size: 1rem; }
        .btn-primary:hover { background: #2a3a5a; }
        .btn-outline { background: transparent; border: 2px solid #4a7cf7; color: #1a2a4a; padding: 8px 20px; border-radius: 60px; font-weight: 500; cursor: pointer; font-size: 0.95rem; }
        .btn-outline:hover { background: #e3edfe; }
        .btn-danger { background: #ffebee; color: #b71c1c; border: none; padding: 8px 20px; border-radius: 60px; font-weight: 500; cursor: pointer; }
        .btn-danger:hover { background: #ffcdd2; }
        .btn-success { background: #2e7d32; color: white; border: none; padding: 8px 20px; border-radius: 60px; font-weight: 500; cursor: pointer; }
        .btn-success:hover { background: #1b5e20; }
        .result-feedback { margin: 12px 0 8px; font-size: 1.1rem; font-weight: 500; min-height: 2rem; }
        .mode-selector {
            display: flex; flex-wrap: wrap; gap: 8px;
            margin: 12px 0 16px;
            justify-content: center;
        }
        .mode-btn {
            background: #eef2f9; border: 2px solid transparent; padding: 6px 18px; border-radius: 40px;
            font-size: 0.85rem; font-weight: 500; color: #1f2f4a; cursor: pointer; transition: 0.15s;
        }
        .mode-btn.active { border-color: #4a7cf7; background: #e3edfe; }
        .mode-btn:hover { background: #dce6f5; }
        .wrong-list {
            margin-top: 20px; background: #fff8f8; border-radius: 24px; padding: 16px 20px;
            border: 1px solid #ffcdd2;
        }
        .wrong-list h3 { font-size: 1rem; color: #b71c1c; margin-bottom: 10px; }
        .wrong-item { display: inline-block; background: #ffebee; padding: 4px 14px; border-radius: 30px; margin: 4px 6px 4px 0; font-size: 0.9rem; }
        .empty-state { color: #6a7f9f; padding: 20px 0; text-align: center; }
        .flex-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .hidden { display: none !important; }
        .mb-8 { margin-bottom: 8px; }
        .mt-8 { margin-top: 8px; }
        .gap-8 { gap: 8px; }
        .footer {
            margin-top: 28px;
            padding-top: 16px;
            border-top: 1px solid #e6edf6;
            text-align: center;
            font-size: 0.8rem;
            color: #8a9fb0;
        }
        .flex-center { display: flex; align-items: center; gap: 8px; justify-content: center; flex-wrap: wrap; }
        @media (max-width: 480px) {
            .app { padding: 18px 14px; }
            .quiz-prompt { font-size: 1.4rem; }
            .word-list { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .header-row { flex-direction: column; }
            .header-right { justify-content: flex-end; }
            .lib-item .name { max-width: 80px; }
            .stats-grid { font-size: 0.75rem; gap: 8px 16px; }
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- 头部 -->
    <div class="header-row">
        <div class="header-left">
            <div class="header-top">
                <h1>📘 英语考100</h1>
            </div>
            <div class="library-container" id="libraryContainer">
                <span class="library-label">📚 词库</span>
                <span class="lib-empty" id="libEmpty">暂无词库，点击右上角上传</span>
            </div>
        </div>
        <div class="header-right">
            <button class="btn-secondary" id="resetAllBtn" style="font-size:0.8rem;">🔄 重置</button>
            <span class="upload-btn-wrapper">
                <button class="btn-upload">📤 上传词库</button>
                <input type="file" id="fileInput" accept=".xlsx,.xls" multiple>
            </span>
        </div>
    </div>
    <div class="subhead">📂 点击词库切换 · 支持搜索 · AI例句 · 语音听写</div>

    <!-- 学习统计 -->
    <div class="stats-grid" id="statsGrid">
        <span class="item">📅 连续打卡 <span class="num" id="streakDays">0</span> 天</span>
        <span class="item">📖 今日 <span class="num" id="todayLearned">0</span> 词</span>
        <span class="item">🎯 正确率 <span class="num" id="todayAccuracy">0</span>%</span>
        <button class="btn-sm" id="resetStatsBtn">重置统计</button>
    </div>

    <!-- 搜索 -->
    <div class="search-row">
        <input class="search-input" id="searchInput" placeholder="🔍 搜索单词..." />
        <button class="btn-secondary" id="searchBtn">搜索</button>
        <button class="btn-secondary" id="clearSearchBtn">清除</button>
    </div>
    <div class="search-result" id="searchResult"></div>

    <div class="stats-bar" id="statsBar">
        <span>📚 <span id="wordCount">0</span> 词</span>
        <span class="badge" id="progressBadge">✅ 0%</span>
        <span class="wrong-badge" id="wrongBadge">❌ 错词 0</span>
        <span style="margin-left:auto;">
            <button class="btn-success" id="enterQuizBtn" style="padding:4px 20px;font-size:0.85rem;">🚀 进入背诵</button>
        </span>
    </div>

    <div class="group-nav" id="groupNav"></div>
    <div class="progress-wrap" id="progressWrap">
        <span style="font-size:0.85rem; color:#3a5a7a;" id="groupLabel">第 1 组</span>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span style="font-size:0.85rem; color:#3a5a7a;" id="progressText">0/0</span>
    </div>

    <div id="browseMode">
        <div class="word-list" id="wordList"></div>
    </div>

    <div id="quizMode" class="hidden">
        <div class="flex-row mb-8">
            <button class="btn-secondary" id="backToBrowseBtn">⬅ 返回列表</button>
            <span style="font-size:0.9rem;color:#4a6a8a;" id="quizGroupLabel">第1组 · 背诵</span>
        </div>
        <div class="mode-selector" id="modeSelector">
            <button class="mode-btn active" data-mode="zh2en">📝 中文→英文</button>
            <button class="mode-btn" data-mode="phonetic2en">🔊 音标→英文</button>
            <button class="mode-btn" data-mode="listen2en">🎧 听音→拼写</button>
            <button class="mode-btn" data-mode="voice2en">🎤 语音听写</button>
        </div>
        <div class="quiz-area">
            <div class="quiz-prompt" id="quizPrompt">准备开始</div>
            <div class="quiz-hint" id="quizHint">点击下方“开始背诵”</div>
            <div class="flex-center">
                <input class="quiz-input" id="quizInput" placeholder="输入英文" autocomplete="off">
                <button class="btn-mic" id="micBtn" title="点击麦克风语音输入">🎤</button>
            </div>
            <div style="margin-bottom: 10px;">
                <button class="btn-outline" id="replayBtn" style="display:none;">🔊 重播读音</button>
                <button class="btn-outline" id="aiExampleBtn" style="display:none;">🤖 AI例句</button>
            </div>
            <div class="quiz-actions">
                <button class="btn-primary" id="submitBtn">确认</button>
                <button class="btn-secondary" id="prevBtn">上一词</button>
                <button class="btn-secondary" id="nextBtn">下一词</button>
            </div>
            <div class="result-feedback" id="feedback"></div>
            <div id="aiExampleDisplay" style="margin-top:8px;font-size:0.9rem;color:#4a6a8a;background:#f0f4fa;padding:8px 14px;border-radius:16px;display:none;"></div>
            <div style="margin-top:6px;font-size:0.85rem;color:#6a7f9f;">
                进度: <span id="currentIndexSpan">0</span> / <span id="totalInGroupSpan">0</span>
            </div>
        </div>
    </div>

    <div class="wrong-list" id="wrongList">
        <h3>📕 错词本 <span id="wrongCountLabel">(0)</span></h3>
        <div id="wrongWordsContainer"><span class="empty-state">暂无错词，继续加油！</span></div>
        <button class="btn-danger" id="clearWrongBtn" style="margin-top:10px;">清空错词本</button>
        <button class="btn-secondary" id="reviewWrongBtn" style="margin-top:10px;margin-left:8px;">📖 复习错词</button>
    </div>

    <div class="footer">
        © 2026 英语考100 · 自用学习工具 · AI例句需配置API密钥
    </div>
</div>

<script>
(function(){
    // ----- 数据结构 -----
    let library = [];
    let currentLibId = null;
    let currentGroupIndex = 0;
    let currentWordIndex = 0;
    let currentMode = 'zh2en';
    let isQuizMode = false;
    let isReviewMode = false;
    let reviewWords = [];
    let currentReviewIndex = 0;
    let currentWordForReplay = '';
    let savedGroupIndex = 0;
    let savedWordIndex = 0;

    // 统计相关
    let stats = { streak: 0, todayLearned: 0, todayCorrect: 0, todayWrong: 0, lastDate: '' };
    let isFirstLoadToday = true;

    const GROUP_SIZE = 50;
    const STORAGE_KEY_LIBRARY = 'wordPro_library';
    const STORAGE_KEY_CURRENT = 'wordPro_currentLib';
    const STORAGE_KEY_PROGRESS = 'wordPro_progress';
    const STORAGE_KEY_WRONG = 'wordPro_wrong';
    const STORAGE_KEY_STATS = 'wordPro_stats';

    // ----- AI 配置 (请替换为你的 API 密钥) -----
    // 推荐使用 DeepSeek 或 SiliconFlow，免费额度足够个人使用
    const AI_API_KEY = '';  // 在这里填入你的 API Key
    const AI_API_URL = 'https://api.siliconflow.cn/v1/chat/completions';  // SiliconFlow 示例
    // 如果用 DeepSeek: https://api.deepseek.com/v1/chat/completions

    const $ = id => document.getElementById(id);
    const fileInput = $('fileInput');
    const libraryContainer = $('libraryContainer');
    const libEmpty = $('libEmpty');
    const wordCountSpan = $('wordCount');
    const progressBadge = $('progressBadge');
    const wrongBadge = $('wrongBadge');
    const groupNav = $('groupNav');
    const progressFill = $('progressFill');
    const progressText = $('progressText');
    const groupLabel = $('groupLabel');
    const wordListEl = $('wordList');
    const browseMode = $('browseMode');
    const quizMode = $('quizMode');
    const enterQuizBtn = $('enterQuizBtn');
    const backToBrowseBtn = $('backToBrowseBtn');
    const quizGroupLabel = $('quizGroupLabel');
    const quizPrompt = $('quizPrompt');
    const quizHint = $('quizHint');
    const quizInput = $('quizInput');
    const submitBtn = $('submitBtn');
    const prevBtn = $('prevBtn');
    const nextBtn = $('nextBtn');
    const feedback = $('feedback');
    const currentIndexSpan = $('currentIndexSpan');
    const totalInGroupSpan = $('totalInGroupSpan');
    const wrongListContainer = $('wrongWordsContainer');
    const wrongCountLabel = $('wrongCountLabel');
    const clearWrongBtn = $('clearWrongBtn');
    const reviewWrongBtn = $('reviewWrongBtn');
    const resetAllBtn = $('resetAllBtn');
    const replayBtn = $('replayBtn');
    const aiExampleBtn = $('aiExampleBtn');
    const aiExampleDisplay = $('aiExampleDisplay');
    const micBtn = $('micBtn');
    const searchInput = $('searchInput');
    const searchBtn = $('searchBtn');
    const clearSearchBtn = $('clearSearchBtn');
    const searchResult = $('searchResult');
    const streakDays = $('streakDays');
    const todayLearned = $('todayLearned');
    const todayAccuracy = $('todayAccuracy');
    const resetStatsBtn = $('resetStatsBtn');

    // ----- 语音识别 -----
    let recognition = null;
    let isListening = false;

    function initSpeechRecognition() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            micBtn.style.display = 'none';
            return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript.trim();
            quizInput.value = transcript;
            micBtn.classList.remove('listening');
            isListening = false;
            micBtn.textContent = '🎤';
            feedback.textContent = '🎤 已识别: "' + transcript + '"';
            feedback.style.color = '#1a2a4a';
            // 自动提交
            setTimeout(() => { if (!submitBtn.disabled) submitBtn.click(); }, 300);
        };
        recognition.onerror = function(event) {
            micBtn.classList.remove('listening');
            isListening = false;
            micBtn.textContent = '🎤';
            feedback.textContent = '⚠️ 语音识别失败: ' + event.error;
            feedback.style.color = '#f57c00';
        };

    // ----- 存储函数 -----

    // ----- 统计函数 -----
    function loadStats() {
        try { const raw = localStorage.getItem(STORAGE_KEY_STATS); if (raw) return JSON.parse(raw); } catch(e) {}
        return { streak: 0, todayLearned: 0, todayCorrect: 0, todayWrong: 0, lastDate: '' };
    }
    function saveStats(s) {
        localStorage.setItem(STORAGE_KEY_STATS, JSON.stringify(s));
    }

    function updateStats() {
        stats = loadStats();
        const today = new Date().toDateString();
        if (stats.lastDate !== today) {
            // 新的一天
            if (stats.lastDate) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                if (stats.lastDate === yesterday.toDateString() && stats.todayLearned > 0) {
                    stats.streak += 1;
                } else if (stats.todayLearned === 0) {
                    // 如果今天还没学，不重置连续天数，等学了再更新
                }
            } else {
                stats.streak = 0;
            }
            // 重置今日数据
            stats.todayLearned = 0;
            stats.todayCorrect = 0;
            stats.todayWrong = 0;
            stats.lastDate = today;
            saveStats(stats);
        }
        renderStats();
    }

    function renderStats() {
        stats = loadStats();
        streakDays.textContent = stats.streak;
        todayLearned.textContent = stats.todayLearned;
        const total = stats.todayCorrect + stats.todayWrong;
        const acc = total > 0 ? Math.round((stats.todayCorrect / total) * 100) : 0;
        todayAccuracy.textContent = acc;
    }

    function recordAnswer(isCorrect) {
        stats = loadStats();
        const today = new Date().toDateString();
        if (stats.lastDate !== today) {
            stats.lastDate = today;
            stats.todayLearned = 0;
            stats.todayCorrect = 0;
            stats.todayWrong = 0;
            if (stats.todayLearned === 0 && stats.streak > 0) {
                // 保持连续天数
            }
        }
        stats.todayLearned += 1;
        if (isCorrect) stats.todayCorrect += 1;
        else stats.todayWrong += 1;
        saveStats(stats);
        renderStats();
    }

    function resetStats() {
        if (confirm('确定重置所有学习统计数据吗？')) {
            stats = { streak: 0, todayLearned: 0, todayCorrect: 0, todayWrong: 0, lastDate: '' };
            saveStats(stats);
            renderStats();
            feedback.textContent = '📊 统计已重置';
            feedback.style.color = '#4a6a8a';
        }
    }

    // ----- AI 生成例句 -----
    async function fetchAIExample(word) {
        if (!AI_API_KEY) {
            return '⚠️ 请配置 AI_API_KEY（在代码顶部）';
        }
        try {
            const response = await fetch(AI_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + AI_API_KEY
                },
                body: JSON.stringify({
                    model: 'Qwen/Qwen2.5-7B-Instruct',
                    messages: [
                        { role: 'system', content: '你是一个英语学习助手。请为给定的单词生成一个简单易懂的英文例句，并附上中文翻译。格式：英文例句（中文翻译）。只输出这一句，不要其他内容。' },
                        { role: 'user', content: '单词: ' + word }
                    ],
                    max_tokens: 150,
                    temperature: 0.7
                })
            });
            if (!response.ok) {
                return '⚠️ API 请求失败 (请检查密钥或网络)';
            }
            const data = await response.json();
            return data.choices?.[0]?.message?.content || '⚠️ 未获取到例句';
        } catch(e) {
            return '⚠️ 请求出错: ' + e.message;
        }
    }

    // ----- 搜索功能 -----
    function searchWord(query) {
        const lib = library.find(l => l.id === currentLibId);
        if (!lib || !query.trim()) {
            searchResult.style.display = 'none';
            return;
        }
        const q = query.trim().toLowerCase();
        const found = lib.words.find(w => w.en.toLowerCase() === q || w.zh.includes(q));
        if (found) {
            searchResult.style.display = 'block';
            searchResult.innerHTML = `
                <span class="sr-en">${found.en}</span>
                <span class="sr-ph">${found.phonetic || ''}</span>
                <span class="sr-zh">${found.zh}</span>
                ${found.mastered ? ' ✅ 已掌握' : ' 📖 学习中'}
                <button class="btn-sm" onclick="window._speakWord('${found.en.replace(/'/g, "\\'")}')">🔊 发音</button>
            `;
        } else {
            searchResult.style.display = 'block';
            searchResult.innerHTML = '❌ 未找到该单词';
        }
    }

    searchBtn.addEventListener('click', function() {
        searchWord(searchInput.value);
    });
    searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') searchWord(searchInput.value);
    });
    clearSearchBtn.addEventListener('click', function() {
        searchInput.value = '';
        searchResult.style.display = 'none';
    });

    // ----- 核心函数 -----
    function getCurrentWords() {
        if (isReviewMode) return reviewWords;
        const lib = library.find(l => l.id === currentLibId);
        if (!lib) return [];
        const start = currentGroupIndex * GROUP_SIZE;
        const end = Math.min(start + GROUP_SIZE, lib.words.length);
        return lib.words.slice(start, end);
    }

    function getGroupCount(lib) {
        if (!lib) return 1;
        return Math.ceil(lib.words.length / GROUP_SIZE) || 1;
    }

    function speakWord(word) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(word);
        u.lang = 'en-US';
        u.rate = 0.9;
        const voices = window.speechSynthesis.getVoices();
        const enVoice = voices.find(v => v.lang.startsWith('en-US')) || voices.find(v => v.lang.startsWith('en'));
        if (enVoice) u.voice = enVoice;
        window.speechSynthesis.speak(u);
    }
    window._speakWord = speakWord;

    // ----- 渲染函数 (略, 保留核心逻辑) -----
    function renderLibrary() {
        if (library.length === 0) {
            libraryContainer.innerHTML = `<span class="library-label">📚 词库</span><span class="lib-empty">暂无词库，点击右上角上传</span>`;
            return;
        }
        let html = `<span class="library-label">📚 词库</span>`;
        for (const lib of library) {
            const active = lib.id === currentLibId ? 'active' : '';
            const nameDisplay = lib.name.length > 18 ? lib.name.substring(0, 18) + '…' : lib.name;
            html += `
                <span class="lib-item ${active}" data-id="${lib.id}">
                    <span class="name" title="${lib.name}">${nameDisplay}</span>
                    <span class="count">${lib.words.length}</span>
                    <button class="del-btn" data-id="${lib.id}" title="删除词库">✕</button>
                </span>
            `;
        }
        libraryContainer.innerHTML = html;
        libraryContainer.querySelectorAll('.lib-item').forEach(el => {
            el.addEventListener('click', function(e) {
                if (e.target.classList.contains('del-btn')) return;
                const id = this.dataset.id;
                if (id && id !== currentLibId) switchLibrary(id);

    function switchLibrary(id) {
        const lib = library.find(l => l.id === id);
        if (!lib) return;
        currentLibId = id;
        saveCurrentLibId(id);
        currentGroupIndex = 0;
        currentWordIndex = 0;
        isReviewMode = false;
        currentReviewIndex = 0;
        if (isQuizMode) {
            isQuizMode = false;
            quizMode.classList.add('hidden');
            browseMode.classList.remove('hidden');
        }
        renderAll();

        searchResult.style.display = 'none';

    function deleteLibrary(id) {
        library = library.filter(l => l.id !== id);
        saveLibrary(library);
        if (currentLibId === id) {
            if (library.length > 0) { currentLibId = library[0].id; saveCurrentLibId(currentLibId); }
            else { currentLibId = null; saveCurrentLibId(null); }
        }
        renderAll();
        renderLibrary();
        if (library.length === 0) {
            quizPrompt.textContent = '📤 请上传词库';
            quizHint.textContent = '点击右上角 "上传词库" 按钮';
        }
        searchResult.style.display = 'none';
    }

    function addLibrary(name, words) {
        const existing = library.find(l => l.name === name);
        if (existing) {
            existing.words = words;
        } else {
            const id = 'lib_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6);
            library.push({ id, name, words });
        }
        saveLibrary(library);
        currentLibId = existing ? existing.id : library[library.length - 1].id;
        saveCurrentLibId(currentLibId);
        currentGroupIndex = 0;
        currentWordIndex = 0;
        isReviewMode = false;
        currentReviewIndex = 0;
        renderAll();
        renderLibrary();
        searchResult.style.display = 'none';
        // 更新统计
        updateStats();
    }

    function parseExcelFile(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });
                    const parsed = [];
                    for (const row of json) {
                        if (!row || row.length < 1) continue;
                        const en = String(row[0] || '').trim();
                        const phonetic = String(row[1] || '').trim();
                        const zh = String(row[2] || '').trim();
                        if (en && zh) parsed.push({ en, phonetic, zh, mastered: false });
                    }
                    resolve(parsed);
                } catch(err) { reject(err); }
            };
            reader.onerror = reject;
            reader.readAsArrayBuffer(file);
        });
    }

    async function handleFiles(files) {
        if (!files || files.length === 0) return;
        for (const file of files) {
            const ext = file.name.split('.').pop().toLowerCase();
            if (!['xlsx', 'xls'].includes(ext)) {
                alert('请上传 .xlsx 或 .xls 文件: ' + file.name);
                continue;
            }
            try {
                const list = await parseExcelFile(file);
                if (!list || list.length === 0) {
                    alert('未读取到有效单词: ' + file.name);
                    continue;
                }
                const progress = loadProgress(currentLibId);
                for (const w of list) {
                    if (progress[w.en] === true) w.mastered = true;
                }
                addLibrary(file.name, list);
                feedback.textContent = `📚 已加载 ${list.length} 个单词 (${file.name})`;
                feedback.style.color = '#1a2a4a';
            } catch(err) {
                alert('解析失败: ' + file.name + '\n' + err.message);
            }
        }
        updateStats();
    }

    function renderProgress() {
        const lib = library.find(l => l.id === currentLibId);
        if (!lib) {
            wordCountSpan.textContent = '0';
            progressFill.style.width = '0%';
            progressText.textContent = '0/0';
            progressBadge.textContent = '✅ 0%';
            wrongBadge.textContent = '❌ 错词 0';
            groupLabel.textContent = '无词库';
            return;
        }
        const words = getCurrentWords();
        const total = words.length;
        let mastered = 0;
        for (const w of words) if (w.mastered) mastered++;
        const pct = total > 0 ? Math.round((mastered/total)*100) : 0;
        progressFill.style.width = pct + '%';
        progressText.textContent = `${mastered}/${total}`;
        const groupNum = isReviewMode ? '错词复习' : `第${currentGroupIndex+1}组`;
        groupLabel.textContent = groupNum;
        wordCountSpan.textContent = lib.words.length;
        const totalMastered = lib.words.filter(w => w.mastered).length;
        const totalPct = lib.words.length > 0 ? Math.round((totalMastered/lib.words.length)*100) : 0;
        progressBadge.textContent = `✅ ${totalPct}%`;
        const wrongs = loadWrongWords(currentLibId);
        wrongBadge.textContent = `❌ 错词 ${wrongs.length}`;

    // 提交, 上一词, 下一词 (关键函数)
    function handleSubmit() {
        const words = getCurrentWords();
        if (!words || words.length === 0) return;
        let idx = isReviewMode ? currentReviewIndex : currentWordIndex;
        if (idx >= words.length) return;
        const word = words[idx];
        const input = quizInput.value.trim();
        if (!input) {
            feedback.textContent = '⚠️ 请输入单词';
            feedback.style.color = '#f57c00';
            return;
        }
        const isCorrect = input.toLowerCase() === word.en.toLowerCase();
        if (isCorrect) {
            feedback.textContent = '✅ 正确！';
            feedback.style.color = '#2e7d32';
            word.mastered = true;
            let wrongs = loadWrongWords(currentLibId);
            const newWrongs = wrongs.filter(w => w.en.toLowerCase() !== word.en.toLowerCase());
            if (newWrongs.length !== wrongs.length) {
                saveWrongWords(currentLibId, newWrongs);
                renderWrongWords();
            }
            const progress = {};
            const lib = library.find(l => l.id === currentLibId);
            if (lib) {
                for (const w of lib.words) progress[w.en] = w.mastered;
                saveProgress(currentLibId, progress);
                saveLibrary(library);
            }
            recordAnswer(true);
        } else {
            feedback.textContent = `❌ 错误，正确答案: ${word.en}`;
            feedback.style.color = '#c62828';
            let wrongs = loadWrongWords(currentLibId);
            if (!wrongs.some(w => w.en.toLowerCase() === word.en.toLowerCase())) {
                wrongs.push({ en: word.en, zh: word.zh, phonetic: word.phonetic });
                saveWrongWords(currentLibId, wrongs);
                renderWrongWords();
            }
            recordAnswer(false);
        }
        renderProgress();
        renderBrowseMode();
        setTimeout(() => {
            if (isCorrect) moveNext();
        }, 1000);
    }

    function movePrev() {
        const words = getCurrentWords();
        if (!words || words.length === 0) return;
        let idx = isReviewMode ? currentReviewIndex : currentWordIndex;
        if (idx > 0) {
            if (isReviewMode) currentReviewIndex--;
            else currentWordIndex--;
            renderQuizMode();
            renderProgress();
            renderBrowseMode();
        } else {
            feedback.textContent = '⚠️ 已是第一个词';
            feedback.style.color = '#f57c00';
        }
    }

    function moveNext() {
        const words = getCurrentWords();
        if (!words || words.length === 0) return;
        let idx = isReviewMode ? currentReviewIndex : currentWordIndex;
        if (idx + 1 < words.length) {
            if (isReviewMode) currentReviewIndex++;
            else currentWordIndex++;
            renderQuizMode();
            renderProgress();
            renderBrowseMode();
        } else {
            if (isReviewMode) {
                quizPrompt.textContent = '🎉 错词复习完成！';
                quizHint.textContent = '点击 "返回列表" 继续';
            } else {
                quizPrompt.textContent = '🎉 本组已完成！';
                quizHint.textContent = '点击 "返回列表" 查看进度';
            }
            quizInput.disabled = true;
            submitBtn.disabled = true;
            replayBtn.style.display = 'none';
            aiExampleBtn.style.display = 'none';
        }
    }

    function reviewWrongWords() {
        const wrongs = loadWrongWords(currentLibId);
        if (wrongs.length === 0) {
            feedback.textContent = '🎉 没有错词，继续保持！';
            feedback.style.color = '#2e7d32';
            return;
        }
        savedGroupIndex = currentGroupIndex;
        savedWordIndex = currentWordIndex;
        isReviewMode = true;
        reviewWords = wrongs.map(w => ({ en: w.en, zh: w.zh, phonetic: w.phonetic || '', mastered: false }));
        currentReviewIndex = 0;
        if (!isQuizMode) {
            isQuizMode = true;
            browseMode.classList.add('hidden');
            quizMode.classList.remove('hidden');
        }
        renderGroupNav();
        renderProgress();
        renderQuizMode();
        renderBrowseMode();
    }

    function backToBrowse() {
        if (isReviewMode) {
            isReviewMode = false;
            currentGroupIndex = savedGroupIndex;
            currentWordIndex = savedWordIndex;
        }
        isQuizMode = false;
        quizMode.classList.add('hidden');
        browseMode.classList.remove('hidden');
        renderBrowseMode();
        renderProgress();
        replayBtn.style.display = 'none';
        aiExampleBtn.style.display = 'none';
        aiExampleDisplay.style.display = 'none';
        micBtn.style.display = 'none';
    }

    function clearWrongWords() {
        if (confirm('确定清空错词本吗？')) {
            saveWrongWords(currentLibId, []);
            renderWrongWords();
            renderProgress();
            feedback.textContent = '🗑️ 错词本已清空';
            feedback.style.color = '#4a6a8a';
        }
    }

    function resetAll() {
        if (confirm('重置所有学习进度？（单词数据不会丢失）')) {
            const lib = library.find(l => l.id === currentLibId);
            if (lib) {
                for (const w of lib.words) w.mastered = false;
                saveProgress(currentLibId, {});
                saveWrongWords(currentLibId, []);
                saveLibrary(library);
            }
            currentWordIndex = 0;
            isReviewMode = false;
            currentReviewIndex = 0;
            renderAll();
            renderWrongWords();
            renderProgress();
            renderBrowseMode();
            if (isQuizMode) renderQuizMode();
            feedback.textContent = '🔄 已重置所有进度';
            feedback.style.color = '#4a6a8a';
        }
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === mode);
        });
        // 语音模式特殊处理
        if (mode === 'voice2en') {
            micBtn.style.display = 'inline-block';
        } else {
            micBtn.style.display = 'none';
            if (isListening) {
                try { recognition.stop(); } catch(e) {}
                isListening = false;
                micBtn.classList.remove('listening');
                micBtn.textContent = '🎤';
            }
        }
        renderQuizMode();
    }

    function enterQuiz() {
        const words = getCurrentWords();
        if (words.length === 0) {
            alert('当前组没有单词，请先上传词库或切换分组');
            return;
        }
        isQuizMode = true;
        browseMode.classList.add('hidden');
        quizMode.classList.remove('hidden');
        currentWordIndex = 0;
        if (isReviewMode) currentReviewIndex = 0;
        renderQuizMode();
        renderProgress();
    }

    function renderAll() {
        renderGroupNav();
        renderProgress();
        renderBrowseMode();
        if (isQuizMode) renderQuizMode();
        renderLibrary();
        renderStats();
    }

    function restoreFromStorage() {
        library = loadLibrary();
        currentLibId = loadCurrentLibId();
        if (currentLibId && !library.find(l => l.id === currentLibId)) {
            currentLibId = library.length > 0 ? library[0].id : null;
            saveCurrentLibId(currentLibId);
        }
        if (!currentLibId && library.length > 0) {
            currentLibId = library[0].id;
            saveCurrentLibId(currentLibId);
        }
        if (library.length === 0) {
            renderAll();
            renderWrongWords();
            renderProgress();
            quizPrompt.textContent = '📤 请上传词库';
            quizHint.textContent = '点击右上角 "上传词库" 按钮';
            updateStats();
            return false;
        }
        const progress = loadProgress(currentLibId);
        const lib = library.find(l => l.id === currentLibId);
        if (lib) {
            for (const w of lib.words) {
                if (progress[w.en] === true) w.mastered = true;
            }
            saveLibrary(library);
        }
        currentGroupIndex = 0;
        currentWordIndex = 0;
        isReviewMode = false;
        currentReviewIndex = 0;
        renderAll();
        renderWrongWords();
        renderProgress();
        updateStats();
        return true;
    }

    // ----- 事件绑定 -----
    fileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files.length > 0) {
            handleFiles(e.target.files);
        }
        fileInput.value = '';
    });

    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', function() { setMode(this.dataset.mode); });
    });

    enterQuizBtn.addEventListener('click', enterQuiz);
    backToBrowseBtn.addEventListener('click', backToBrowse);
    submitBtn.addEventListener('click', handleSubmit);
    prevBtn.addEventListener('click', movePrev);
    nextBtn.addEventListener('click', moveNext);
    clearWrongBtn.addEventListener('click', clearWrongWords);
    reviewWrongBtn.addEventListener('click', reviewWrongWords);
    resetAllBtn.addEventListener('click', resetAll);
    resetStatsBtn.addEventListener('click', resetStats);

    quizInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            if (!submitBtn.disabled) submitBtn.click();
        }
    });

    // 重播
    replayBtn.addEventListener('click', function() {
        if (currentWordForReplay) {
            speakWord(currentWordForReplay);
            this.textContent = '✅ 已重播';
            setTimeout(() => { this.textContent = '🔊 重播读音'; }, 800);
        }
    });

    if (window.speechSynthesis) {
        setTimeout(() => window.speechSynthesis.getVoices(), 400);
    }

    // 初始化语音识别
    initSpeechRecognition();

    // 启动
    const hasRestored = restoreFromStorage();
    if (!hasRestored) {
        renderAll();
        renderWrongWords();
        renderProgress();
        quizPrompt.textContent = '📤 请上传词库';
        quizHint.textContent = '点击右上角 "上传词库" 按钮';
        updateStats();
    }
    console.log('📘 英语考100 (智能版) 已启动');
})();
</script>
</body>
</html>
